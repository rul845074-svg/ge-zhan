<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI产品全流程图 · 小焦的历险记</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --sky-top: #7d93ea;
  --sky-mid: #a9baf8;
  --sky-bottom: #dfe7ff;
  --paper: #fffdf7;
  --paper-soft: #f8f8ff;
  --ink: #262934;
  --ink-soft: #61708d;
  --line: #262934;
  --pink: #f187b5;
  --yellow: #ffd56c;
  --teal: #4aa793;
  --mint: #84d1b7;
  --blue: #6f84d1;
  --lav: #e6dcff;
  --peach: #ffd4bf;
  --serif: "Noto Serif SC", serif;
  --stroke: 2.5px solid var(--line);
  --shadow-flat: 0 10px 0 rgba(38,41,52,0.12);
  --shadow-card: 0 14px 0 rgba(38,41,52,0.08);
}

*,
*::before,
*::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: "Noto Sans SC", "PingFang SC", "Hiragino Sans GB", sans-serif;
  color: var(--ink);
  min-height: 100vh;
  line-height: 1.6;
  background:
    radial-gradient(circle at 10% 16%, rgba(255,255,255,0.42), transparent 16%),
    radial-gradient(circle at 84% 10%, rgba(255,215,108,0.18), transparent 18%),
    linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 34%, var(--sky-bottom) 72%, #eef3ff 100%);
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: -2;
  background:
    radial-gradient(circle at 20% 82%, rgba(255,255,255,0.2) 0 7px, transparent 8px) 0 0 / 36px 36px,
    linear-gradient(180deg, rgba(255,255,255,0.22), transparent 24%);
  opacity: 0.26;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: -1;
  background:
    radial-gradient(ellipse at 78% 18%, rgba(255,255,255,0.26), transparent 34%),
    radial-gradient(ellipse at 14% 92%, rgba(255,255,255,0.24), transparent 28%);
}

::selection { background: rgba(255,213,108,0.5); }

button { font: inherit; color: inherit; }

.site-header {
  position: relative;
  overflow: hidden;
  padding: 40px 24px 26px;
}

.site-header::before {
  content: "";
  position: absolute;
  width: 260px;
  height: 260px;
  right: -70px;
  top: -70px;
  border-radius: 50%;
  background: rgba(255,255,255,0.18);
  border: var(--stroke);
  opacity: 0.32;
}

.site-header::after {
  content: "";
  position: absolute;
  width: 180px;
  height: 180px;
  left: -40px;
  bottom: 18px;
  border-radius: 44px;
  background: rgba(255,255,255,0.16);
  border: var(--stroke);
  transform: rotate(16deg);
  opacity: 0.24;
}

.header-shell {
  max-width: 1280px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(430px, 560px);
  gap: 36px;
  align-items: center;
  position: relative;
  z-index: 1;
}

.hero-copy {
  position: relative;
  z-index: 2;
  padding: 14px 0 8px;
}

.header-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 18px;
  margin-bottom: 20px;
  background: var(--paper);
  border: var(--stroke);
  border-radius: 999px;
  box-shadow: var(--shadow-flat);
  transform: rotate(-2deg);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1.4px;
  text-transform: uppercase;
}

.site-title {
  font-family: "ZCOOL KuaiLe", cursive;
  font-size: clamp(44px, 7vw, 92px);
  line-height: 0.98;
  letter-spacing: 2px;
  margin-bottom: 18px;
  max-width: 700px;
  text-wrap: balance;
}

.site-title em {
  font-style: normal;
  color: var(--pink);
  text-shadow: 4px 4px 0 rgba(255,255,255,0.35);
}

.site-sub {
  max-width: 590px;
  padding: 18px 22px;
  border-radius: 30px;
  border: var(--stroke);
  background: rgba(255,255,255,0.65);
  box-shadow: 0 10px 0 rgba(38,41,52,0.08);
  font-size: 16px;
  color: #24324a;
  text-wrap: pretty;
}

.site-meta {
  margin-top: 18px;
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  max-width: 720px;
}

.meta-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 16px;
  border-radius: 999px;
  border: var(--stroke);
  background: rgba(255,255,255,0.82);
  box-shadow: 0 8px 0 rgba(38,41,52,0.06);
  font-size: 13px;
  font-weight: 600;
  color: #33415d;
}

.meta-pill:nth-child(2) { transform: rotate(-2deg); }
.meta-pill:nth-child(3) { transform: rotate(2deg); }

.hero-graphic {
  position: relative;
  min-height: 438px;
  border: var(--stroke);
  border-radius: 44px;
  background: linear-gradient(180deg, #89a0f1 0%, #c8d4ff 100%);
  box-shadow: 0 16px 0 rgba(38,41,52,0.1);
  overflow: hidden;
}

.hero-graphic::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 32% 14%, rgba(255,255,255,0.42), transparent 18%),
    linear-gradient(180deg, rgba(255,255,255,0.08), transparent 34%);
}

.hero-graphic::after {
  content: "";
  position: absolute;
  left: -4%;
  right: -4%;
  bottom: -70px;
  height: 148px;
  border-top: var(--stroke);
  border-radius: 50% 50% 0 0 / 100% 100% 0 0;
  background: rgba(255,255,255,0.16);
}

.hero-scene {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 620px;
  height: 440px;
  transform: translate(-50%, -50%);
}

.scene-splash,
.scene-star,
.scene-pencil,
.scene-arc,
.scene-screen,
.scene-box,
.scene-bike,
.scene-basket,
.scene-rider,
.scene-leaf,
.scene-flower {
  position: absolute;
}

.scene-splash {
  width: 88px;
  height: 116px;
  left: 26px;
  top: 112px;
  background: var(--pink);
  border: var(--stroke);
  border-radius: 22px 22px 28px 24px;
  transform: rotate(-24deg);
}

.scene-splash::before {
  content: "";
  position: absolute;
  width: 84px;
  height: 22px;
  left: -2px;
  top: -18px;
  border: var(--stroke);
  border-radius: 999px;
  background: #90a5f2;
}

.scene-splash::after {
  content: "";
  position: absolute;
  width: 64px;
  height: 32px;
  left: -28px;
  top: 2px;
  background: var(--line);
  border-radius: 60% 20% 70% 30%;
  transform: rotate(-16deg);
}

.scene-star {
  width: 128px;
  height: 128px;
  left: 132px;
  top: 72px;
  transform: rotate(-18deg);
  z-index: 2;
  background: var(--line);
  clip-path: polygon(50% 0%, 62% 28%, 100% 18%, 74% 50%, 100% 82%, 62% 72%, 50% 100%, 38% 72%, 0% 82%, 26% 50%, 0% 18%, 38% 28%);
}

.scene-star::before {
  content: "";
  position: absolute;
  inset: 8px;
  background: var(--yellow);
  clip-path: inherit;
}

.scene-pencil {
  width: 314px;
  height: 60px;
  left: 118px;
  top: 152px;
  border: var(--stroke);
  border-radius: 20px;
  background: var(--blue);
  transform: rotate(-30deg);
  z-index: 3;
}

.scene-pencil::before {
  content: "";
  position: absolute;
  left: -28px;
  top: -2px;
  width: 30px;
  height: 60px;
  border: var(--stroke);
  border-right: none;
  border-radius: 18px 0 0 18px;
  background: var(--yellow);
}

.scene-pencil::after {
  content: "";
  position: absolute;
  right: -58px;
  top: -2px;
  width: 58px;
  height: 60px;
  background: linear-gradient(90deg, #f8f9ff 0%, #f8f9ff 74%, #111 74%, #111 100%);
  border: var(--stroke);
  clip-path: polygon(0 0, 100% 50%, 0 100%);
}

.scene-arc {
  width: 240px;
  height: 240px;
  right: 26px;
  top: 18px;
  border: 28px solid var(--pink);
  border-left-color: transparent;
  border-bottom-color: transparent;
  border-radius: 50%;
  transform: rotate(-4deg);
  z-index: 1;
}

.scene-arc::before {
  content: "";
  position: absolute;
  inset: -10px;
  border: 32px solid var(--line);
  border-left-color: transparent;
  border-bottom-color: transparent;
  border-radius: 50%;
  z-index: -1;
}

.scene-arc::after {
  content: "";
  position: absolute;
  width: 14px;
  height: 14px;
  right: 22px;
  top: 42px;
  border-radius: 50%;
  background: var(--paper);
  border: var(--stroke);
  box-shadow:
    -86px -28px 0 -1px var(--line),
    -78px -24px 0 6px var(--paper),
    -118px 36px 0 -1px var(--line),
    -108px 26px 0 6px var(--paper);
}

.scene-screen {
  width: 102px;
  height: 90px;
  left: 316px;
  top: 58px;
  border: var(--stroke);
  border-radius: 22px;
  background: var(--paper);
  transform: rotate(12deg);
  z-index: 4;
}

.scene-screen::before,
.scene-screen::after {
  content: "";
  position: absolute;
  background: var(--teal);
  border: var(--stroke);
  border-radius: 50%;
}

.scene-screen::before {
  width: 26px;
  height: 42px;
  left: 22px;
  top: 22px;
  transform: rotate(-18deg);
}

.scene-screen::after {
  width: 24px;
  height: 38px;
  right: 22px;
  top: 24px;
  transform: rotate(24deg);
}

.scene-box {
  width: 136px;
  height: 88px;
  left: 308px;
  top: 156px;
  border: var(--stroke);
  border-radius: 16px;
  background: var(--yellow);
  z-index: 3;
}

.scene-box::before {
  content: "";
  position: absolute;
  left: 56px;
  top: 0;
  width: 20px;
  height: 88px;
  background: var(--paper);
}

.scene-box::after {
  content: "";
  position: absolute;
  left: 14px;
  top: -10px;
  width: 32px;
  height: 16px;
  border: var(--stroke);
  border-radius: 8px 8px 0 0;
  background: var(--yellow);
  box-shadow: 64px 0 0 -2px var(--yellow), 64px 0 0 0 var(--line);
}

.scene-rider {
  z-index: 5;
}

.scene-rider span {
  position: absolute;
  display: block;
}

.rider-left {
  left: 98px;
  bottom: 26px;
  width: 226px;
  height: 220px;
}

.rider-left .rider-head {
  width: 66px;
  height: 66px;
  left: 52px;
  top: 46px;
  border-radius: 50%;
  background: #d47c57;
  border: var(--stroke);
}

.rider-left .rider-hair {
  width: 72px;
  height: 34px;
  left: 46px;
  top: 44px;
  border-radius: 40px 40px 10px 10px;
  background: var(--line);
}

.rider-left .rider-body {
  width: 142px;
  height: 126px;
  left: 42px;
  top: 88px;
  border-radius: 56% 46% 48% 52%;
  border: var(--stroke);
  background: var(--blue);
  transform: rotate(14deg);
}

.rider-left .rider-arm {
  width: 120px;
  height: 40px;
  left: -10px;
  top: 108px;
  border-radius: 999px;
  border: var(--stroke);
  background: #cf754f;
  transform: rotate(-12deg);
}

.rider-right {
  left: 300px;
  bottom: 12px;
  width: 210px;
  height: 210px;
}

.rider-right .rider-head {
  width: 62px;
  height: 62px;
  left: 72px;
  top: 54px;
  border-radius: 50%;
  background: #ffd7c8;
  border: var(--stroke);
}

.rider-right .rider-hair {
  width: 72px;
  height: 48px;
  left: 52px;
  top: 52px;
  border-radius: 18px 40px 28px 18px;
  background: var(--line);
  transform: rotate(10deg);
}

.rider-right .rider-body {
  width: 128px;
  height: 138px;
  left: 46px;
  top: 94px;
  border-radius: 40% 48% 54% 44%;
  border: var(--stroke);
  background: var(--teal);
  transform: rotate(8deg);
}

.rider-right .rider-arm {
  width: 110px;
  height: 38px;
  left: 28px;
  top: 118px;
  border-radius: 999px;
  border: var(--stroke);
  background: var(--pink);
  transform: rotate(-12deg);
}

.scene-bike {
  width: 460px;
  height: 224px;
  left: 90px;
  bottom: 18px;
  z-index: 4;
}

.bike-wheel {
  position: absolute;
  width: 132px;
  height: 132px;
  border-radius: 50%;
  border: 8px solid var(--line);
  background: repeating-conic-gradient(from 0deg, transparent 0 28deg, rgba(38,41,52,0.22) 28deg 29deg);
}

.bike-wheel::before {
  content: "";
  position: absolute;
  inset: 18px;
  border-radius: 50%;
  border: 2px solid rgba(38,41,52,0.25);
}

.bike-wheel::after {
  content: "";
  position: absolute;
  inset: 52px;
  border-radius: 50%;
  border: var(--stroke);
  background: #eef0f8;
}

.bike-wheel-left { left: 18px; bottom: 0; }
.bike-wheel-right { right: 8px; bottom: 0; }

.bike-bar,
.bike-seat,
.bike-handle {
  position: absolute;
}

.bike-bar {
  height: 4px;
  border-radius: 999px;
  background: var(--line);
}

.bike-bar-1 { left: 146px; top: 112px; width: 122px; transform: rotate(28deg); }
.bike-bar-2 { left: 214px; top: 148px; width: 88px; transform: rotate(-56deg); }
.bike-bar-3 { left: 254px; top: 164px; width: 118px; transform: rotate(38deg); }
.bike-bar-4 { left: 214px; top: 160px; width: 106px; transform: rotate(5deg); }
.bike-bar-5 { left: 132px; top: 168px; width: 94px; transform: rotate(-36deg); }
.bike-bar-6 { left: 318px; top: 164px; width: 88px; transform: rotate(-70deg); }
.bike-bar-7 { left: 392px; top: 84px; width: 52px; transform: rotate(96deg); }

.bike-seat {
  left: 246px;
  top: 104px;
  width: 30px;
  height: 10px;
  border-radius: 999px;
  background: var(--line);
}

.bike-handle {
  left: 388px;
  top: 76px;
  width: 42px;
  height: 40px;
  border-top: 4px solid var(--line);
  border-right: 4px solid var(--line);
  border-radius: 0 22px 0 0;
  transform: rotate(10deg);
}

.scene-basket {
  width: 116px;
  height: 80px;
  right: 20px;
  bottom: 106px;
  border: var(--stroke);
  border-radius: 14px 14px 22px 22px;
  background:
    repeating-linear-gradient(to right, transparent 0 18px, rgba(38,41,52,0.18) 18px 20px),
    repeating-linear-gradient(to bottom, transparent 0 16px, rgba(38,41,52,0.18) 16px 18px),
    rgba(255,255,255,0.82);
  transform: skew(-12deg);
  z-index: 3;
}

.scene-basket::before {
  content: "";
  position: absolute;
  left: -26px;
  top: -4px;
  width: 32px;
  height: 80px;
  border-left: var(--stroke);
  border-top: var(--stroke);
  border-radius: 26px 0 0 0;
}

.scene-leaf {
  width: 58px;
  height: 24px;
  border: var(--stroke);
  border-radius: 60% 0 60% 0;
  background: var(--mint);
  z-index: 4;
}

.leaf-a { right: 86px; bottom: 142px; transform: rotate(-20deg); }
.leaf-b { right: 42px; bottom: 136px; transform: rotate(12deg); }
.leaf-c { right: 92px; bottom: 118px; transform: rotate(26deg); }
.leaf-d { right: 22px; bottom: 118px; transform: rotate(-18deg); }

.scene-flower {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: var(--stroke);
  background: var(--pink);
  z-index: 5;
}

.scene-flower::before {
  content: "";
  position: absolute;
  inset: -14px;
  background:
    radial-gradient(circle at 50% 0, var(--yellow) 0 10px, transparent 10.5px),
    radial-gradient(circle at 0 50%, var(--yellow) 0 10px, transparent 10.5px),
    radial-gradient(circle at 100% 50%, var(--yellow) 0 10px, transparent 10.5px),
    radial-gradient(circle at 50% 100%, var(--yellow) 0 10px, transparent 10.5px),
    radial-gradient(circle at 18% 18%, var(--yellow) 0 10px, transparent 10.5px),
    radial-gradient(circle at 82% 18%, var(--yellow) 0 10px, transparent 10.5px),
    radial-gradient(circle at 18% 82%, var(--yellow) 0 10px, transparent 10.5px),
    radial-gradient(circle at 82% 82%, var(--yellow) 0 10px, transparent 10.5px);
  filter: drop-shadow(0 1px 0 rgba(38,41,52,0.6));
  z-index: -1;
}

.flower-a { right: 92px; bottom: 198px; }
.flower-b { right: 32px; bottom: 182px; }
.flower-c { right: 68px; bottom: 152px; }

.timeline-section {
  position: sticky;
  top: 0;
  z-index: 50;
  padding: 0 24px 18px;
  background: linear-gradient(180deg, rgba(125,147,234,0.86) 0%, rgba(125,147,234,0) 100%);
}

.timeline-inner {
  max-width: 1280px;
  margin: 0 auto;
  width: 100%;
  padding: 14px 18px;
  display: flex;
  align-items: center;
  overflow-x: auto;
  scrollbar-width: none;
  border-radius: 999px;
  border: var(--stroke);
  background: rgba(255,255,255,0.82);
  box-shadow: 0 12px 0 rgba(38,41,52,0.1);
}

.timeline-inner::-webkit-scrollbar { display: none; }

.t-node {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  flex: 1 1 0;
  min-width: 0;
  padding: 8px 10px;
  border: none;
  border-radius: 28px;
  background: transparent;
  color: var(--ink-soft);
  cursor: pointer;
  transition: transform 0.2s ease, background 0.2s ease;
}

.t-node:hover {
  transform: translateY(-2px);
  background: rgba(255,255,255,0.58);
}

.t-node.active {
  background: rgba(255,255,255,0.92);
  box-shadow: 0 8px 0 rgba(38,41,52,0.06);
}

.t-dot {
  width: 48px;
  height: 48px;
  display: grid;
  place-items: center;
  border-radius: 18px;
  border: var(--stroke);
  background: var(--paper);
  font-size: 19px;
  transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease;
}

.t-node.active .t-dot {
  transform: translateY(-2px);
  background: var(--ch-color);
  color: #fff;
}

.t-name {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.4px;
  white-space: nowrap;
}

.t-stage {
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
  opacity: 0.72;
}

.t-line {
  flex: 0 0 clamp(18px, 2.1vw, 36px);
  height: 6px;
  border-radius: 999px;
  background: rgba(38,41,52,0.18);
}

.chapter-area {
  max-width: 1280px;
  margin: 0 auto;
  padding: 18px 24px 72px;
}

.chapter-card {
  position: relative;
  overflow: hidden;
  border-radius: 38px;
  border: var(--stroke);
  background: var(--paper);
  box-shadow: var(--shadow-card);
  animation: cardIn 0.45s cubic-bezier(0.16, 1, 0.3, 1);
}

.chapter-card::before {
  content: "";
  position: absolute;
  right: 30px;
  top: 24px;
  width: 108px;
  height: 24px;
  border-radius: 999px;
  border: var(--stroke);
  background: rgba(255,255,255,0.45);
  transform: rotate(8deg);
  opacity: 0.78;
  pointer-events: none;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(28px) scale(0.985); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.ch-band {
  position: relative;
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 22px;
  align-items: flex-start;
  padding: 34px 38px;
  color: #fff;
  border-bottom: var(--stroke);
  overflow: hidden;
}

.ch-band::before {
  content: "";
  position: absolute;
  right: 36px;
  top: 18px;
  width: 146px;
  height: 146px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.24);
  background: rgba(255,255,255,0.08);
}

.ch-band::after {
  content: attr(data-num);
  position: absolute;
  right: -4px;
  top: -26px;
  font-size: 180px;
  font-weight: 900;
  line-height: 1;
  letter-spacing: -8px;
  opacity: 0.14;
}

.ch-hero-emoji {
  width: 84px;
  height: 84px;
  display: grid;
  place-items: center;
  flex-shrink: 0;
  border-radius: 28px;
  border: var(--stroke);
  background: rgba(255,255,255,0.88);
  color: var(--line);
  font-size: 44px;
  z-index: 1;
}

.ch-band-body { min-width: 0; position: relative; z-index: 1; }

.ch-seq {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2.4px;
  text-transform: uppercase;
  opacity: 0.76;

let activeId = 1;

function diffStars(n) {
  return "⭐".repeat(n) + "☆".repeat(3 - n);
}

function renderTimeline() {
  const inner = document.getElementById("timelineInner");
  inner.innerHTML = CHAPTERS.map((ch, i) => `
    ${i > 0 ? `<div class="t-line"></div>` : ""}
    <button class="t-node ${ch.id === activeId ? "active" : ""}"
      style="--ch-color:${ch.color}"
      onclick="showChapter(${ch.id})">
      <div class="t-dot">${ch.emoji}</div>
      <div class="t-name">第${ch.id}章</div>
      <div class="t-stage">${ch.shortName}</div>
    </button>
  `).join("");
}

function renderChapter(ch) {
  if (!ch.panels) {
    return `
      <div class="placeholder-card" style="--ch-color:${ch.color};--ch-soft:${ch.soft};--ch-border:${ch.border}">
        <div class="ph-emoji">${ch.emoji}</div>
        <div class="ph-title">第${ch.id}章 · ${ch.shortName}</div>
        <div class="ph-sub">${ch.stage} &nbsp;·&nbsp; ${ch.stageEn}</div>
        <div style="margin-top:12px;font-size:13px;color:#9B8570">内容即将填入</div>
      </div>`;
  }

  const processTermsHtml = (ch.processTerms || []).map(t =>
    `<span class="ch-process-tag">${t}</span>`
  ).join("");

  // build a role→quotes map for quick lookup
  const osMap = {};
  (ch.roles || []).forEach(r => { osMap[r.role] = r.os; });

  const panelsHtml = ch.panels.map((p, i) => {
    const hasOS = !!osMap[p.who];
    const quotesAttr = hasOS
      ? `data-clickable="1" onclick="showOSFromPanel(event,'${p.who}',${JSON.stringify(osMap[p.who]).replace(/"/g,'&quot;')})"`
      : "";
    return `
      ${i > 0 ? `<div class="p-arrow">›</div>` : ""}
      <div class="p-mini ${p.mood}" ${quotesAttr}>
        <div class="p-scene-icon">${p.icon}</div>
        <div class="p-mood">${p.moodEmoji}</div>
        <div class="p-who">${p.who}</div>
        <div class="p-line">${p.line}</div>
        ${hasOS ? `<div class="p-hint">点击看内心OS 💭</div>` : ""}
      </div>`;
  }).join("");

  const tagsHtml = ch.capabilities.map(t =>
    `<span class="tag" style="--ch-color:${ch.color};--ch-soft:${ch.soft};--ch-border:${ch.border}">${t}</span>`
  ).join("");

  const rolesHtml = (ch.roles || []).map(r =>
    `<button class="role-chip" style="--ch-color:${ch.color};--ch-soft:${ch.soft}"
       onclick="showOS(event,'${r.role}',${JSON.stringify(r.os).replace(/"/g,'&quot;')})">
       ${r.emoji} ${r.role}<span class="rc-hint">💭</span>
     </button>`
  ).join("");

  const meetingsHtml = (ch.meetings || []).map(m => `
    <div class="meeting-item">
      <div class="mi-title">${m.title}</div>
      <div class="mi-meta">⏱ ${m.duration} &nbsp;·&nbsp; 类型：${m.type}</div>
      <div class="mi-attendees">参会：${m.attendees.join(" · ")}</div>
      ${m.note ? `<div class="mi-meta" style="margin-top:3px">📌 ${m.note}</div>` : ""}
    </div>
  `).join("");

  const delsHtml = (ch.deliverables || []).map(d => `
    <div class="del-item">
      <div class="del-icon">${d.icon}</div>
      <div class="del-body">
        <div class="del-name">${d.name}</div>
        <div class="del-desc">${d.desc}</div>
      </div>
    </div>
  `).join("");

  const capTagsHtml = ch.capabilities.map(t =>
    `<span class="cap-tag" style="--ch-color:${ch.color}">${t}</span>`
  ).join("");

  const nextCh = CHAPTERS.find(c => c.id === ch.id + 1);
  const nextBar = nextCh ? `
    <div class="next-bar" style="--next-color:${nextCh.color};--next-soft:${nextCh.soft};--next-border:${nextCh.border}" onclick="showChapter(${nextCh.id})">
      <div class="next-bar-text">
        <strong>下一章 · ${nextCh.shortName}</strong>
        ${ch.suspense || ""}
      </div>
      <div class="next-arrow">${nextCh.emoji} →</div>
    </div>` : "";

  return `
    <div class="chapter-card" style="--ch-color:${ch.color};--ch-soft:${ch.soft};--ch-border:${ch.border}">

      <div class="ch-band" style="background:${ch.color}" data-en="${ch.stageEn}" data-num="${ch.id}">
        <div class="ch-hero-emoji">${ch.emoji}</div>
        <div class="ch-band-body">
          <div class="ch-seq">第 ${ch.id} 章 · ${ch.stage}</div>
          <div class="ch-title">${ch.shortName}</div>
          <div class="ch-en-label">${ch.stageEn}</div>
          <div class="ch-tagline">「${ch.tagline}」</div>
          <div class="ch-meta-row">
            <div class="ch-diff">难度 ${diffStars(ch.difficulty)} · ${ch.diffLabel}</div>
            <div class="ch-scene-info">📍 ${ch.scene}</div>
            ${processTermsHtml}
          </div>
        </div>
      </div>

      <div class="story-strip">
        <div class="section-label">故事线 · 关键节点</div>
        <div class="panels-row">${panelsHtml}</div>
      </div>

      <div class="info-grid">
        <div class="info-block">
          <div class="ib-icon">⚡</div>
          <div class="ib-label">核心挑战</div>
          <div class="ib-content">${ch.challenge}</div>
        </div>
        <div class="info-block">
          <div class="ib-icon">🧭</div>
          <div class="ib-label">解决路径</div>
          <div class="ib-content">${ch.solution}</div>
        </div>
        <div class="info-block">
          <div class="ib-icon">🏷️</div>
          <div class="ib-label">PM 能力标签</div>
          <div class="ib-content">
            <div class="tag-row">${tagsHtml}</div>
          </div>
        </div>
        <div class="info-block">
          <div class="ib-icon">⏱️</div>
          <div class="ib-label">时间节点</div>
          <div class="ib-content">${ch.time}</div>
        </div>
      </div>

      <div class="meeting-section">
        <div class="meeting-header">📋 本章速览 · 会议 &amp; 产出物</div>
        <div class="meeting-body">
          <div class="meeting-left">
            <div class="ms-title">会议信息</div>
            <div class="roles-line">${rolesHtml}</div>
            ${meetingsHtml}
            <div class="decision-box" style="--ch-color:${ch.color}">
              <strong>本章关键决策</strong>
              ${ch.decision}
            </div>
          </div>
          <div class="meeting-right">
            <div class="ms-title">产出物</div>
            ${delsHtml}
          </div>
        </div>
      </div>

      <div class="cap-bar">
        <span class="cap-label">PM能力雷达</span>
        ${capTagsHtml}
      </div>

      <div class="pitfall-bar">
        <div class="pit-icon">💥</div>
        <div class="pit-body">
          <div class="pit-heading">踩坑 · 反思</div>
          <div class="pit-trap">${ch.pitfall}</div>
          <div class="pit-lesson">🔍 ${ch.lesson}</div>
        </div>
      </div>

      ${nextBar}
    </div>`;
}

/* ── OS Easter Egg ── */
let osHideTimer = null;

function _triggerOS(event, role, quotes) {
  event.stopPropagation();
  const popup = document.getElementById("osPopup");
  const text = quotes[Math.floor(Math.random() * quotes.length)];
  document.getElementById("osPopupRole").textContent = role + " · 内心OS";
  document.getElementById("osPopupText").textContent = text;

  const rect = event.currentTarget.getBoundingClientRect();
  const left = Math.min(rect.left, window.innerWidth - 300);
  const top  = rect.bottom + 10;   // fixed定位用视口坐标，不加scrollY
  popup.style.display = "block";
  popup.style.left = left + "px";
  popup.style.top  = top + "px";

  clearTimeout(osHideTimer);
  osHideTimer = setTimeout(hideOS, 4500);
}

// called from panel click
function showOSFromPanel(event, role, quotes) { _triggerOS(event, role, quotes); }

// called from role chip click (kept for meeting section)
function showOS(event, role, quotes) { _triggerOS(event, role, quotes); }

function hideOS() {
  document.getElementById("osPopup").style.display = "none";
}

document.addEventListener("click", hideOS);

/* ── Chapter switching ── */
function showChapter(id) {
  activeId = id;
  renderTimeline();
  const ch = CHAPTERS.find(c => c.id === id);
  document.getElementById("chapterMount").innerHTML = renderChapter(ch);
  document.querySelector(".chapter-area").scrollIntoView({ behavior: "smooth", block: "start" });
  history.replaceState(null, "", `#ch${id}`);
}

function init() {
  const hash = window.location.hash.match(/^#ch(\d)$/);
  activeId = hash ? Number(hash[1]) : 1;
  renderTimeline();
  const ch = CHAPTERS.find(c => c.id === activeId);
  document.getElementById("chapterMount").innerHTML = renderChapter(ch);
}

init();
